services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: ${DATABASE_URL:?DATABASE_URL is required}
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET is required}
      Cors__AllowedOrigins__0: ${FRONTEND_URL:?FRONTEND_URL is required}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: headsheet_prod
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:?DB_USER is required}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_prod_data:
