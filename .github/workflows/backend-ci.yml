name: Backend CI

on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/backend-ci.yml']
  pull_request:
    paths: ['backend/**', '.github/workflows/backend-ci.yml']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: headsheet_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: backend

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: backend

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal
        working-directory: backend
        env:
          ConnectionStrings__Default: "Host=localhost;Port=5432;Database=headsheet_test;Username=postgres;Password=test"
